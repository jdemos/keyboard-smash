name: Create Labels
on:
  push:
    branches:
      - copilot/review-repository-for-improvements
    paths:
      - '.github/workflows/create-labels.yml'
  workflow_dispatch:
jobs:
  create-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create priority and impact labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          gh label create "priority: high" --color "d73a4a" --description "🔴 High priority" --repo "$REPO" --force
          gh label create "priority: medium" --color "e4812b" --description "🟠 Medium priority" --repo "$REPO" --force
          gh label create "priority: low" --color "fbca04" --description "🟡 Low priority" --repo "$REPO" --force
          gh label create "impact: ux" --color "e99695" --description "User experience improvement" --repo "$REPO" --force
          gh label create "impact: performance" --color "0075ca" --description "Improves rendering or runtime performance" --repo "$REPO" --force
          gh label create "impact: accessibility/safety" --color "5319e7" --description "Accessibility or safety improvement" --repo "$REPO" --force
          gh label create "impact: code quality" --color "1d76db" --description "Improves code quality or encapsulation" --repo "$REPO" --force
          gh label create "impact: installability" --color "0e8a16" --description "Installability or offline support" --repo "$REPO" --force
          gh label create "impact: stability" --color "bfd4f2" --description "Runtime stability improvement" --repo "$REPO" --force
          gh label create "impact: maintainability" --color "c2e0c6" --description "Code maintainability improvement" --repo "$REPO" --force
          echo "All labels created!"
